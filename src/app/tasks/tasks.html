<section id="tasks">
    @if(isAddingTask)
    {
        <div class="backdrop" (click)="onClose()"></div>

        <div class="modal" (click)="$event.stopPropagation()">
            <!-- <app-new-task (close)="onClose()" (addTask)="onSubmit($event)" [userId]="id()" /> -->
            <app-new-task (close)="onClose()" [userId]="id()" />
        </div>
    }
    <header>
        <h2>{{ name() }}'s tasks</h2>
        <menu>
            <div>
                <span>Filter by Category</span>
                <select [(ngModel)]="filter"  name="filter">
                    <option value="">All</option>
                    <option value="frontend">frontend</option>
                    <option value="backend">backend</option>
                    <option value="devops">devops</option>
                    <option value="marketing">marketing</option>
                </select>
            </div>
            <div>
                <span>Search Tasks</span>
                <input 
                    type="text" 
                    [(ngModel)]="searchTerm" 
                    placeholder="Search tasks"
                    name="search"
                />
            </div>
            <button (click)="onAdd()">Add Task</button>
        </menu>
    </header>
    <div>
        <ul>
            @if(selectedUserTasks.length>0)
            {
                @for(task of selectedUserTasks; track task.id)
                {
                    <li>
                        <!-- <app-task [task]="task" (completed)="onTaskComplete($event)"/> -->
                         <app-task [task]="task" />
                    </li>
                }
            }
            @else {
                <p>No Tasks Available</p>
            }
        </ul>
    </div>
</section>
