<div>
    <button id="user-btn" (click)="onSelectedUser()" [class.active]="selected()">
        <img [src]="imagePath()" [alt]="user().name"/>
        <span> {{ user().name }} </span>
    </button>
    <button id="del" (click)="onDeleteUserTrigger()">
        <img [src]="deletePath" alt="delete" height="20px" width="20px"/>
    </button>
</div>

<div>
    @if(deleteUserTrigger)
    {
        <div class="backdrop" (click)="deleteUserTrigger=false"></div>
        <div class="modal" (click)="$event.stopPropagation()">
            <p>Are you sure you want to delete {{ user().name }}?</p>
            <div>
                <button (click)="onDeleteUser()">Yes</button>
                <button (click)="deleteUserTrigger=false">No</button>    
            </div>
            
        </div>
    }
</div>
